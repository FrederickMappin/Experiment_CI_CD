name: Docker Package

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image tarball
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: simplecalculator:latest
          outputs: type=docker,dest=/tmp/simplecalculator-image.tar

      - name: Upload packaged image artifact
        uses: actions/upload-artifact@v4
        with:
          name: simplecalculator-docker-image
          path: /tmp/simplecalculator-image.tar
